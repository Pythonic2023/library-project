<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="scripts/main.js" defer></script>
    <link rel="stylesheet" href="styles/main.css">

    <!--Geist Pixel Font-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist+Pixel:ELSH@50&display=swap" rel="stylesheet">

    <!--Roboto Font-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

</head>
<body>
    
    <div class="grid-container">
        <div class="header">
            <h1 class="title">Virtual Library</h1>
            <dialog>
                <form id="modal-form" method="post">
                    <p>
                        <label for="title">Title</label>
                        <input type="text" name="title" id="title">
                    </p>
                    <p>
                        <label for="author">Author</label>
                        <input type="text" name="author" id="author">
                    </p>
                    <p>
                        <label for="pages">Pages</label>
                        <input type="text" name="pages" id="pages">
                    </p>
                    <p>
                        <label for="read">Read</label>
                        <input type="text" name="read" id="read">
                    </p>
                    <div>
                        <button>Close</button>
                        <button id="add-book">Add Book</button>
                    </div>
                </form>
            </dialog>
            <button class="new-book">New Book</button>
        </div>
        <div class="side-bar">
            <img id="sidebar-image" src="assets/images/library-sidebar.jpg" alt="library books and ladder">
        </div>
        <div class="books" id="books-container"></div>
    </div>
</body>
</html>
